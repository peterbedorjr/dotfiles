# Cyberpunk Neon — minimal style
# No background blocks. Neon text on transparent bg. Lets CRT/bloom breathe.

format = """
$directory$git_branch$git_status$fill$nodejs$rust$golang$python$php$docker_context$cmd_duration
$character"""

right_format = ""

palette = "cyberpunk"

[palettes.cyberpunk]
neon_purple = "#987afb"
neon_cyan = "#04d1f9"
neon_green = "#37f499"
neon_lime = "#9ad900"
neon_magenta = "#f94dff"
neon_red = "#f16c75"
neon_pink = "#fca6ff"
dark_bg = "#0D1116"

# ── Directory ────────────────────────────────────────────
[directory]
style = "bold fg:neon_cyan"
format = "[$path]($style) "
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"code" = " "
"dotfiles" = " "

# ── Git ──────────────────────────────────────────────────
[git_branch]
symbol = ""
style = "fg:neon_green"
format = "[$symbol $branch]($style) "

[git_status]
style = "fg:neon_green"
format = "[$all_status$ahead_behind]($style)"
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
modified = "[~${count}](fg:neon_lime) "
staged = "[+${count}](fg:neon_green) "
untracked = "[?${count}](fg:neon_purple) "
deleted = "[-${count}](fg:neon_red) "
conflicted = "[!${count}](bold fg:neon_red) "
stashed = "[*${count}](fg:neon_pink) "

# ── Fill (pushes right-side info to the edge) ───────────
[fill]
symbol = " "

# ── Languages (dim, right-aligned) ──────────────────────
[nodejs]
symbol = ""
style = "fg:neon_lime"
format = "[$symbol $version]($style) "

[rust]
symbol = ""
style = "fg:neon_red"
format = "[$symbol $version]($style) "

[golang]
symbol = ""
style = "fg:neon_cyan"
format = "[$symbol $version]($style) "

[python]
symbol = ""
style = "fg:neon_purple"
format = "[$symbol $version]($style) "

[php]
symbol = ""
style = "fg:neon_pink"
format = "[$symbol $version]($style) "

# ── Docker ───────────────────────────────────────────────
[docker_context]
symbol = ""
style = "fg:neon_magenta"
format = "[$symbol $context]($style) "

# ── Command Duration ─────────────────────────────────────
[cmd_duration]
min_time = 2000
style = "dimmed fg:neon_pink"
format = "[$duration]($style) "

# ── Prompt Character ─────────────────────────────────────
[character]
success_symbol = "[❯](bold fg:neon_green)"
error_symbol = "[❯](bold fg:neon_red)"
